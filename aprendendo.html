<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <p>Parágrafo</p> <!--O <p> é o parágrafo-->
        <form action="">
            <input type="type" placeholder="Digite algo"> <!--O form action e o input cria uma caixa em branco-->  <!--O form action é necessário para criar a caixa vazia--> 
        </form> <!--O placeholder vai ser a mensagem em branco com baixa opacidade dentro da caixa-->
        <h1>Texto</h1> <!--O h1 vai criar um título grande, ele vai até o h6-->
        <br> <!--O br vai criar um espaço, tipo o enter-->
        <label for=""> Algo interessante </label> <!--O label vai ser para adicionar um texto acima de botões e outros-->
        <input type="checkbox"> <!--O checkbox é a caixinha de seleção-->
        <input type="radio"> <!--O radio é o botão de seleção-->
        <mark>Texto em destaque</mark> <!--O mark é usado para destacar texto-->
        <em>Texto em itálico</em> <!--O em é usado para texto em itálico-->
        <strong>Texto em negrito</strong> <!--O strong é usado para texto em negrito-->
        <sub>Texto subscrito</sub> <!--O sub é usado para texto subscrito. Ele fica abaixo do texto normal-->
        <sup>Texto superescrito</sup> <!--O sup é usado para texto superescrito, como número elevado. Tipo 2 ao quadrado-->
        <img src="Foto vem aqui" alt=""> <!--O img é usado para inserir imagens, o src é o caminho da imagem e o alt é o texto alternativo caso a imagem não carregue-->
</body>
</html>
