<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos</title> <link rel="shortcut icon" href="images/sedan.png" type="image/x-icon">
</head>
<body>
    <div>
        <h1>Listas não ordenadas</h1>
        <ul>
            <li>Porsche 1</li>
            <li>Mclaren 2</li>
            <li>Ferrari 3</li>
        </ul>
    </div>

    <div>
        <h1>Listas ordenadas</h1>
        <ol>
            <li>Porsche </li>
            <li>Mclaren </li>
            <li>Ferrari </li>
        </ol>
    </div>

    <div>
        <h1>Listas ordenadas com numeração romana</h1>
        <ol type="I">
            <li>Porsche </li>
            <li>Mclaren </li>
            <li>Ferrari </li>
        </ol>
    </div>

    <div>
        <h1>Lista de Definição</h1>
        <dl>
            <dt>Carro:</dt>
            <dd>Porsche 911</dd>
            <dt>Marca:</dt>
            <dd>Porsche</dd>
        </dl>
    </div>
</body>
</html>
